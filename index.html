<style>
/* ================== RESET / BASE ================== */
body, html {
  margin:0;
  padding:0;
  font-family:'Montserrat',sans-serif;
  height:100%;
  background:#000;
  color:#fff;
}

/* ================== HERO BACKGROUND ================== */
.hero-bg {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.85)),
              linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
              url('assets/images/invitation-small.webp') center/cover no-repeat;
  background-size: cover;
  z-index:0;
  transform: scale(1.05);
  will-change: transform;
}

/* ================== EXCLUSIVE NOTICE ================== */
.hero-exclusive {
  position: absolute;
  top: 15%;
  width: 100%;
  text-align: center;
  z-index: 2;
}
.hero-exclusive .exclusive-notice {
  font-family: 'Playfair Display', serif;
  font-weight: 500;
  font-size: 1.2rem;
  color: #d4c1a1;
  text-transform: uppercase;
  letter-spacing: 2px;
  opacity: 0.9;
  text-shadow: 0 0 12px rgba(212,193,161,0.5);
}

/* ================== INVITE GATE ================== */
.invite-gate {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: #fff;
  animation: fadeIn 1.5s ease;
  will-change: opacity, transform;
}
@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}
.invite-gate h1 { font-size:48px; margin-bottom:10px; }
.invite-gate p { opacity:0.8; letter-spacing:2px; }
.invite-gate input {
  width:280px;
  padding:14px 16px;
  margin-top:20px;
  background: rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.3);
  border-radius:4px;
  color:#fff;
  font-size:14px;
  outline:none;
}
.invite-gate input::placeholder { color: rgba(255,255,255,0.6); }
.invite-gate button {
  width:280px;
  padding:14px;
  margin-top:15px;
  background:#fff;
  color:#000;
  border:none;
  border-radius:4px;
  font-size:13px;
  letter-spacing:2px;
  text-transform:uppercase;
  cursor:pointer;
  transition: background 0.3s ease, color 0.3s ease, transform 0.3s ease, border 0.3s ease;
}
.invite-gate button:hover { background:transparent; color:#fff; border:1px solid #fff; }
.invite-gate button:active { transform:scale(0.97); }
.invite-gate input:focus { border-color:#d4c1a1; box-shadow:0 0 10px rgba(212,193,161,0.3); }
#errorMessage { color:red; display:none; margin-top:10px; }

/* ================== MAIN SITE ================== */
#mainSite {
  display:none;
  position:relative;
  z-index:2;
  min-height:100vh;
  color:white;
  text-align:center;
  padding-bottom:50px;
}

/* Envelope animation */
.open-invitation-envelope {
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  perspective:800px;
  margin-top:60px;
  will-change:transform;
}
.envelope {
  width:240px;
  height:130px;
  position:relative;
  transform-style: preserve-3d;
  transition: transform .3s ease;
  backface-visibility: hidden;
  box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}
.envelope .body {
  width:100%;
  height:100%;
  background: linear-gradient(180deg,#d4c1a1,#a68b6b);
  border-radius:6px;
  position:absolute;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  padding-bottom:14px;
  font-family:'Playfair Display', serif;
  font-weight:500;
  letter-spacing:2px;
  color:#1a1a1a;
  text-transform:uppercase;
}
.envelope .flap {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:55px;
  background:#f8f8f8;
  border-top-left-radius:6px;
  border-top-right-radius:6px;
  transform-origin:top;
  transition: transform .8s cubic-bezier(0.68,-0.55,0.27,1.55);
  z-index:2;
}
.open-invitation-envelope.animate .flap { transform:rotateX(-180deg) rotateY(3deg); background:#fefefe; }
.open-invitation-envelope.animate .body { transform:translateY(-15px) scale(0.95); }

/* Guest list */
#namesListContainer {
  display:flex;
  gap:20px;
  width:90%;
  margin:50px auto;
  max-height:calc(100vh - 250px);
  overflow-y:auto;
  padding-right:10px;

.guestColumn {

  gap:12px;
  flex:1;
  min-width:0;

.guestCard {

  font-weight:500;
  border-radius:12px;
  text-transform:capitalize;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
  word-break:break-word;
}
.guestCard:hover { background:rgba(255,255,255,0.12); transform:translateY(-2px); }
#namesListContainer::-webkit-scrollbar { width:0px; }
#namesListContainer { -ms-overflow-style:none; scrollbar-width:none; }
@media(max-width:768px){ #namesListContainer{ gap:15px; } }

// ================== CHECK GUEST ==================
function checkGuest(){
  const input = normalize(guestInput.value);
  let foundGroup = null, matchedName = null;

  outer: for(const group of guestGroups){
    for(const member of group.members){
      if(normalize(member.name)===input){
        foundGroup=group;
        matchedName=member.name;
        break outer;
      }
      if(member.aliases){
        const match=member.aliases.find(a=>normalize(a)===input);
        if(match){ foundGroup=group; matchedName=member.name; break outer; }
      }
    }
  }

  if(!foundGroup){ errorMessage.style.display="block"; return; }

  errorMessage.style.display="none";
  unlockInvitation(foundGroup, matchedName);
}

// ================== UNLOCK INVITATION ==================
function unlockInvitation(group, name){
  inviteGate.style.opacity = 0;
  if(exclusiveNotice) exclusiveNotice.style.display = 'none';
  setTimeout(()=>{
    inviteGate.style.display = "none";
    mainSite.style.display = "block";
    mainSite.style.opacity = 0;
    guestNameEl.innerText = toTitleCase(name);
    seatCountEl.innerText = group.members.length;
    buildGuestColumns(group);
    requestAnimationFrame(()=> mainSite.style.opacity = 1);
  },600);
}

// ================== BUILD GUEST COLUMNS ==================
function buildGuestColumns(group){
  namesListContainer.innerHTML = "";
  const names = group.members.map(m=>m.name);
  const colHeight = window.innerHeight - 250;
  const approxCardHeight = 50;
  const maxCols = window.innerWidth <=768 ? 2 : 3;
  let columns=[], currentCol=[], currentHeight=0;

  names.forEach(name=>{
    if(currentHeight+approxCardHeight > colHeight && columns.length < maxCols){
      columns.push(currentCol); currentCol=[]; currentHeight=0;
    }
    currentCol.push(name);
    currentHeight += approxCardHeight;
  });
  if(currentCol.length) columns.push(currentCol);

  columns.forEach(col=>{
    const colDiv = document.createElement('div');
    colDiv.className='guestColumn';
    col.forEach(n=>{
      const card = document.createElement('div');
      card.className='guestCard';
      card.innerText = toTitleCase(n);
      colDiv.appendChild(card);
    });
    namesListContainer.appendChild(colDiv);
  });
}

// ================== EVENTS ==================
guestInput.addEventListener('keypress', e=>{ if(e.key==='Enter') checkGuest(); });
document.getElementById('openBtn').addEventListener('click', checkGuest);

});
